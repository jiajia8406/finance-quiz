<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 我的財務人格測驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2540;
    --navy-light: #243052;
    --navy-deep: #0f1829;
    --cream: #f5f0e8;
    --cream-dark: #ede5d5;
    --gold: #c9a84c;
    --gold-light: #e0c97a;
    --gold-pale: #f0e4bb;
    --text-dark: #1a2540;
    --text-mid: #4a5568;
    --text-light: #8a96a8;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--navy-deep);
    color: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Background texture ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.01) 60px, rgba(255,255,255,0.01) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.01) 60px, rgba(255,255,255,0.01) 61px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    padding: 60px 0 48px;
    animation: fadeDown 0.8s ease both;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .ornament-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .ornament-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 8px;
    height: 8px;
    border: 1px solid var(--gold);
    transform: rotate(45deg);
  }

  .header h1 {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 6vw, 36px);
    color: var(--cream);
    letter-spacing: 0.12em;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .header-en {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-style: italic;
    font-size: 14.5px;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-desc {
    font-size: 16px;
    color: rgba(245,240,232,0.6);
    line-height: 1.9;
    letter-spacing: 0.05em;
    max-width: 460px;
    margin: 0 auto;
  }

  /* ─── Progress bar ─── */
  .progress-wrap {
    margin-bottom: 40px;
    animation: fadeIn 0.6s 0.3s both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold-light);
  }

  .progress-bar {
    height: 2px;
    background: rgba(201,168,76,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }

  /* ─── Card base ─── */
  .card {
    background: rgba(26,37,64,0.7);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 4px;
    padding: 36px 32px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.5s ease both;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
  }

  /* ─── Info section ─── */
  .info-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .info-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  .field-group { margin-bottom: 24px; }
  .field-group:last-child { margin-bottom: 0; }

  .field-label {
    display: block;
    font-size: 14px;
    color: rgba(245,240,232,0.5);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }

  .field-required { color: var(--gold); margin-left: 2px; }

  input[type="text"],
  input[type="email"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 3px;
    padding: 12px 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15.5px;
    font-weight: 400;
    color: var(--cream);
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    letter-spacing: 0.05em;
  }

  input[type="text"]:focus,
  input[type="email"]:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  input::placeholder { color: rgba(245,240,232,0.2); }

  /* Radio groups for gender / age */
  .radio-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .radio-chip {
    position: relative;
  }

  .radio-chip input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .radio-chip label {
    display: inline-flex;
    align-items: center;
    padding: 8px 18px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    font-size: 14.5px;
    color: rgba(245,240,232,0.6);
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.08em;
  }

  .radio-chip input[type="radio"]:checked + label {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .radio-chip label:hover {
    border-color: rgba(201,168,76,0.5);
    color: rgba(245,240,232,0.85);
  }

  /* Age: checkbox style (multiple) */
  .checkbox-chip {
    position: relative;
  }

  .checkbox-chip input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .checkbox-chip label {
    display: inline-flex;
    align-items: center;
    padding: 8px 18px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    font-size: 14.5px;
    color: rgba(245,240,232,0.6);
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.08em;
  }

  .checkbox-chip input[type="checkbox"]:checked + label {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  /* ─── Question card ─── */
  .question-num {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin-bottom: 14px;
  }

  .question-text {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--cream);
    line-height: 1.8;
    letter-spacing: 0.06em;
    margin-bottom: 24px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-item {
    position: relative;
  }

  .option-item input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .option-item label {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s;
    font-size: 16px;
    color: rgba(245,240,232,0.7);
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  .option-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--gold);
    min-width: 18px;
    margin-top: 1px;
  }

  .option-item label:hover {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.05);
    color: var(--cream);
  }

  .option-item input[type="radio"]:checked + label {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    color: var(--cream);
  }

  .option-item input[type="radio"]:checked + label .option-letter {
    color: var(--gold-light);
  }

  /* ─── Navigation buttons ─── */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14.5px;
    font-weight: 400;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-prev {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    color: rgba(245,240,232,0.5);
    flex: 0 0 auto;
    padding: 14px 24px;
  }

  .btn-prev:hover {
    border-color: rgba(201,168,76,0.5);
    color: var(--cream);
  }

  .btn-next {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--navy-deep);
    font-weight: 400;
    position: relative;
    overflow: hidden;
  }

  .btn-next::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.3s;
  }

  .btn-next:hover::before { background: rgba(255,255,255,0.1); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-submit {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--navy-deep);
    font-weight: 400;
    width: 100%;
    padding: 16px;
    font-size: 15.5px;
    letter-spacing: 0.2em;
  }

  .btn-submit:hover { opacity: 0.92; }

  /* ─── Result section ─── */
  #result-section { display: none; }

  .result-header {
    text-align: center;
    padding: 48px 0 36px;
  }

  .result-badge {
    display: inline-block;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.35em;
    border: 1px solid rgba(201,168,76,0.35);
    padding: 6px 20px;
    margin-bottom: 24px;
  }

  .result-icon {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
    animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .result-type-name {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: clamp(24px, 6vw, 32px);
    color: var(--gold-light);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .result-subtitle {
    font-size: 14px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.2em;
  }

  /* Score breakdown */
  .score-card {
    background: rgba(15,24,41,0.8);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }

  .score-title {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.25em;
    margin-bottom: 20px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .score-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--gold);
    width: 16px;
    text-align: center;
  }

  .score-bar-wrap {
    flex: 1;
    height: 4px;
    background: rgba(201,168,76,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 4px;
    width: 0;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .score-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15.5px;
    color: rgba(245,240,232,0.5);
    width: 24px;
    text-align: right;
  }

  /* Result description */
  .desc-card {
    background: rgba(26,37,64,0.6);
    border: 1px solid rgba(201,168,76,0.18);
    border-left: 3px solid var(--gold);
    border-radius: 4px;
    padding: 32px 32px;
    margin-bottom: 20px;
  }

  .desc-keyword {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0.25em;
    margin-bottom: 16px;
  }

  .desc-keyword::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--gold);
  }

  .desc-body {
    font-size: 16px;
    color: rgba(245,240,232,0.75);
    line-height: 1.95;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    white-space: pre-line;
  }

  .desc-trait {
    font-size: 15px;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    padding: 10px 16px;
    background: rgba(201,168,76,0.08);
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .desc-advice-title {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .desc-advice-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  .desc-advice-body {
    font-size: 16px;
    color: rgba(245,240,232,0.65);
    line-height: 1.9;
    letter-spacing: 0.04em;
  }

  /* Tie notice */
  .tie-notice {
    text-align: center;
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  /* Submit status */
  .submit-status {
    text-align: center;
    font-size: 14px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.1em;
    margin-top: 16px;
    min-height: 20px;
  }

  .submit-status.success { color: #7ec8a0; }
  .submit-status.error { color: #e0846a; }

  /* Divider ornament */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.15); }
  .divider-icon { font-size: 12px; color: rgba(201,168,76,0.4); }

  /* ─── Animations ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .slide-in {
    animation: fadeUp 0.4s ease both;
  }

  /* Validation error */
  .error-msg {
    font-size: 11.5px;
    color: #e0846a;
    margin-top: 8px;
    letter-spacing: 0.08em;
    display: none;
  }

  .field-error input,
  .field-error .radio-row,
  .field-error .options-list {
    border-color: rgba(224,132,106,0.4);
  }
</style>
</head>
<body>

<div class="container">

  <!-- ═══ QUIZ SECTION ═══ -->
  <div id="quiz-section">

    <div class="header">
      <div class="header-ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>
      <p class="header-en">Financial Personality Quiz</p>
      <h1>✨ 我的財務人格測驗</h1>
      <p class="header-desc">這是一份輕鬆的小測驗，只需要 3 分鐘<br>了解你的財務類型與金錢信念</p>
    </div>

    <!-- Step 0: Basic Info -->
    <div id="step-0" class="step-panel">
      <div class="card slide-in">
        <div class="info-title">基本資料</div>

        <div class="field-group" id="field-name">
          <label class="field-label">姓名 <span class="field-required">*</span></label>
          <input type="text" id="input-name" placeholder="請輸入您的姓名">
          <div class="error-msg" id="err-name">請填寫姓名</div>
        </div>

        <div class="field-group" id="field-email">
          <label class="field-label">電子郵件 <span class="field-required">*</span></label>
          <input type="email" id="input-email" placeholder="example@email.com">
          <div class="error-msg" id="err-email">請填寫有效的 Email</div>
        </div>

        <div class="field-group" id="field-gender">
          <label class="field-label">性別 <span class="field-required">*</span></label>
          <div class="radio-row">
            <div class="radio-chip">
              <input type="radio" name="gender" id="g-male" value="男性">
              <label for="g-male">男性</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="gender" id="g-female" value="女性">
              <label for="g-female">女性</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="gender" id="g-other" value="其他">
              <label for="g-other">其他</label>
            </div>
          </div>
          <div class="error-msg" id="err-gender">請選擇性別</div>
        </div>

        <div class="field-group" id="field-age">
          <label class="field-label">年齡區間 <span class="field-required">*</span></label>
          <div class="radio-row">
            <div class="radio-chip">
              <input type="radio" name="age" id="a1" value="18-20歲">
              <label for="a1">18–20歲</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="age" id="a2" value="21-30歲">
              <label for="a2">21–30歲</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="age" id="a3" value="31-40歲">
              <label for="a3">31–40歲</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="age" id="a4" value="41-50歲">
              <label for="a4">41–50歲</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="age" id="a5" value="51-60歲">
              <label for="a5">51–60歲</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="age" id="a6" value="61-70歲">
              <label for="a6">61–70歲</label>
            </div>
          </div>
          <div class="error-msg" id="err-age">請選擇年齡區間</div>
        </div>

        <div class="field-group" id="field-income">
          <label class="field-label">總年收入（含主要薪資與其他收入）<span class="field-required">*</span></label>
          <div class="radio-row">
            <div class="radio-chip">
              <input type="radio" name="income" id="i1" value="50萬以下">
              <label for="i1">50萬以下</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="income" id="i2" value="50-100萬">
              <label for="i2">50–100萬</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="income" id="i3" value="100-150萬">
              <label for="i3">100–150萬</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="income" id="i4" value="150-200萬">
              <label for="i4">150–200萬</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="income" id="i5" value="200-300萬">
              <label for="i5">200–300萬</label>
            </div>
            <div class="radio-chip">
              <input type="radio" name="income" id="i6" value="300萬以上">

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let userData = { name:"", email:"", gender:"", age:"", income:"" };
let answers = new Array(9).fill(null); // null | "A"|"B"|"C"|"D"|"E"
let currentQ = 0;

// ═══════════════════════════════════════════
// STEP 0 — Basic Info
// ═══════════════════════════════════════════
function startQuiz() {
  const name = document.getElementById("input-name").value.trim();
  const email = document.getElementById("input-email").value.trim();
  const gender = document.querySelector('input[name="gender"]:checked');
  const age = document.querySelector('input[name="age"]:checked');

  let valid = true;

  const showErr = (id, errId, show) => {
    document.getElementById(errId).style.display = show ? "block" : "none";
    document.getElementById(id).classList.toggle("field-error", show);
  };

  if (!name) { showErr("field-name","err-name",true); valid=false; }
  else showErr("field-name","err-name",false);

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr("field-email","err-email",true); valid=false; }
  else showErr("field-email","err-email",false);

  if (!gender) { showErr("field-gender","err-gender",true); valid=false; }
  else showErr("field-gender","err-gender",false);

  if (!age) { showErr("field-age","err-age",true); valid=false; }
  else showErr("field-age","err-age",false);

  const income = document.querySelector('input[name="income"]:checked');
  if (!income) { showErr("field-income","err-income",true); valid=false; }
  else showErr("field-income","err-income",false);

  if (!valid) return;

  userData = { name, email, gender: gender.value, age: age.value, income: income.value };

  document.getElementById("step-0").style.display = "none";
  document.getElementById("step-questions").style.display = "block";
  renderQuestion(0);
}

// ═══════════════════════════════════════════
// QUESTIONS
// ═══════════════════════════════════════════
function renderQuestion(idx) {
  currentQ = idx;
  const q = QUESTIONS[idx];
  const total = QUESTIONS.length;

  // Progress
  document.getElementById("progress-text").textContent = `${idx+1} / ${total}`;
  document.getElementById("progress-fill").style.width = `${((idx+1)/total)*100}%`;

  // Build HTML
  const wrap = document.getElementById("question-wrap");
  wrap.innerHTML = `
    <div class="card slide-in">
      <div class="question-num">Q${idx+1} &nbsp;/&nbsp; ${total}</div>
      <div class="question-text">${q.text}</div>
      <div class="options-list">
        ${q.options.map(opt => `
          <div class="option-item">
            <input type="radio" name="q${idx}" id="q${idx}_${opt.letter}" value="${opt.letter}"
              ${answers[idx]===opt.letter ? "checked" : ""}
              onchange="selectAnswer(${idx},'${opt.letter}')">
            <label for="q${idx}_${opt.letter}">
              <span class="option-letter">${opt.letter}</span>
              <span>${opt.text}</span>
            </label>
          </div>
        `).join("")}
      </div>
      <div class="error-msg" id="err-q" style="margin-top:12px"></div>
    </div>
  `;

  // Nav buttons
  document.getElementById("btn-prev").style.display = idx === 0 ? "none" : "inline-flex";
  const btnNext = document.getElementById("btn-next");
  if (idx === total - 1) {
    btnNext.textContent = "查看結果 ✦";
    btnNext.onclick = submitQuiz;
  } else {
    btnNext.textContent = "下一題 →";
    btnNext.onclick = nextQ;
  }
}

function selectAnswer(idx, letter) {
  answers[idx] = letter;
  // Auto advance after short delay
  if (idx < QUESTIONS.length - 1) {
    setTimeout(() => nextQ(), 400);
  }
}

function nextQ() {
  if (answers[currentQ] === null) {
    const err = document.getElementById("err-q");
    err.textContent = "請選擇一個選項後再繼續";
    err.style.display = "block";
    return;
  }
  renderQuestion(currentQ + 1);
}

function prevQ() {
  if (currentQ > 0) renderQuestion(currentQ - 1);
}

// ═══════════════════════════════════════════
// SUBMIT & RESULT
// ═══════════════════════════════════════════
function submitQuiz() {
  if (answers[currentQ] === null) {
    const err = document.getElementById("err-q");
    err.textContent = "請選擇一個選項後再繼續";
    err.style.display = "block";
    return;
  }

  // Count
  const counts = {A:0,B:0,C:0,D:0,E:0};
  answers.forEach(a => { if(a && counts.hasOwnProperty(a)) counts[a]++; });

  const maxCount = Math.max(...Object.values(counts));
  const topTypes = Object.keys(counts).filter(k => counts[k] === maxCount);

  // Show result
  document.getElementById("quiz-section").style.display = "none";
  document.getElementById("result-section").style.display = "block";
  window.scrollTo(0,0);

  // Primary type (first top)
  const primary = topTypes[0];
  document.getElementById("res-icon").textContent = TYPES[primary].icon;
  document.getElementById("res-name").textContent = TYPES[primary].name;
  document.getElementById("res-subtitle").textContent =
    topTypes.length > 1 ? "並列主要財務人格類型" : "你的主要財務人格類型";

  if (topTypes.length > 1) {
    document.getElementById("tie-notice").style.display = "block";
  }

  // Score bars
  const barsEl = document.getElementById("score-bars");
  barsEl.innerHTML = ["A","B","C","D","E"].map(l => `
    <div class="score-row">
      <span class="score-letter">${l}</span>
      <div class="score-bar-wrap">
        <div class="score-bar" id="bar-${l}" data-count="${counts[l]}" data-max="${maxCount}"></div>
      </div>
      <span class="score-num">${counts[l]}</span>
    </div>
  `).join("");

  // Animate bars
  setTimeout(() => {
    ["A","B","C","D","E"].forEach(l => {
      const bar = document.getElementById(`bar-${l}`);
      const pct = maxCount > 0 ? (parseInt(bar.dataset.count)/parseInt(bar.dataset.max))*100 : 0;
      bar.style.width = pct + "%";
      if (parseInt(bar.dataset.count) === maxCount) {
        bar.style.background = "linear-gradient(90deg, var(--gold), var(--gold-light))";
      } else {
        bar.style.background = "rgba(201,168,76,0.4)";
      }
    });
  }, 100);

  // Description cards
  const descEl = document.getElementById("desc-cards");
  descEl.innerHTML = topTypes.map(t => {
    const tp = TYPES[t];
    return `
      <div class="desc-card slide-in" style="margin-bottom:16px">
        <div class="desc-keyword">${tp.name}</div>
        <div class="desc-body">${tp.body}</div>
        <div class="desc-trait">✅ 金錢特質：${tp.keyword}</div>
        <div class="desc-advice-title">專屬建議</div>
        <div class="desc-advice-body">💡 ${tp.advice}</div>
      </div>
    `;
  }).join('<div class="divider"><div class="divider-line"></div><div class="divider-icon">✦</div><div class="divider-line"></div></div>');

  // Send to Google Sheet
  sendToSheet(counts, topTypes, primary);
}

// ═══════════════════════════════════════════
// GOOGLE SHEET
// ═══════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaFkNBY3Kg2rxOeaTuYZCYURCXMZS7v3mQ6nbWbCXhH73nNg3rBvRMWE4YNIC0lKckng/exec";

function sendToSheet(counts, topTypes, primary) {
  const status = document.getElementById("submit-status");

  const payload = {
    timestamp: new Date().toISOString(),
    name: userData.name,
    email: userData.email,
    gender: userData.gender,
    age: userData.age,
    answers: answers.join(","),
    count_a: counts.A,
    count_b: counts.B,
    count_c: counts.C,
    count_d: counts.D,
    count_e: counts.E,
    result: topTypes.map(t => TYPES[t].name).join("、"),
    income: userData.income,
    primary_type: primary
  };

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    status.textContent = "✓ 資料已成功儲存";
    status.className = "submit-status success";
  })
  .catch(() => {
    status.textContent = "資料儲存失敗，請聯繫管理員";
    status.className = "submit-status error";
  });
}
</script>
